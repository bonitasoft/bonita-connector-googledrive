# GDrive - Move/Rename File connector i18n properties

# Connector label
connectorDefinitionLabel=Google Drive - Move/Rename File
connectorDefinitionDescription=Moves and/or renames a file in Google Drive

# Page labels
connectionPage.pageTitle=Connection Settings
connectionPage.pageDescription=Configure the Google Drive service account connection
moveRenamePage.pageTitle=Move/Rename Settings
moveRenamePage.pageDescription=Configure the file to move or rename
advancedPage.pageTitle=Advanced Settings
advancedPage.pageDescription=Configure advanced move options

# Input widget labels — Connection
serviceAccountKeyJson.label=Service Account Key (JSON)
serviceAccountKeyJson.description=The JSON key of the Google service account
impersonatedUserEmail.label=Impersonated User Email
impersonatedUserEmail.description=Email of the user to impersonate (optional, for domain-wide delegation)
applicationName.label=Application Name
applicationName.description=Name used to identify this application in Google API requests
connectTimeout.label=Connection Timeout (ms)
connectTimeout.description=Timeout in milliseconds for establishing a connection
readTimeout.label=Read Timeout (ms)
readTimeout.description=Timeout in milliseconds for reading the response

# Input widget labels — Move/Rename
fileId.label=File ID
fileId.description=The Google Drive file ID of the file to move or rename
newParentFolderId.label=New Parent Folder ID
newParentFolderId.description=The Google Drive folder ID to move the file into (leave empty to only rename)
newName.label=New Name
newName.description=The new name for the file (leave empty to only move)

# Input widget labels — Advanced
removeFromCurrentParents.label=Remove from Current Parents
removeFromCurrentParents.description=If true, the file is removed from its current parent folders when moved
