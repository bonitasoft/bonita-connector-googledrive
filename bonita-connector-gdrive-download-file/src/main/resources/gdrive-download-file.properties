# Google Drive - Download File Connector
connectorDefinitionLabel=GDrive - Download File
connectorDefinitionDescription=Downloads a file from Google Drive by file ID, returning its content as Base64

# Page labels
connectionPage.name=Connection
connectionPage.description=Configure authentication and connection settings
operationPage.name=Download
operationPage.description=Configure the download file operation parameters

# Input parameter labels
serviceAccountKeyJson.name=Service Account Key (JSON)
serviceAccountKeyJson.description=The JSON key of the Google service account used for authentication
impersonatedUserEmail.name=Impersonated User Email
impersonatedUserEmail.description=Email of the user to impersonate via domain-wide delegation (optional)
applicationName.name=Application Name
applicationName.description=Application name sent to Google APIs for identification
connectTimeout.name=Connect Timeout (ms)
connectTimeout.description=Maximum time in milliseconds to establish a connection
readTimeout.name=Read Timeout (ms)
readTimeout.description=Maximum time in milliseconds to wait for data during a read
fileId.name=File ID
fileId.description=The Google Drive file ID to download
exportMimeType.name=Export MIME Type
exportMimeType.description=MIME type to export Google Workspace files to (e.g. application/pdf). Required for Docs, Sheets, Slides

# Output parameter labels
fileContentBase64.name=File Content (Base64)
fileContentBase64.description=The downloaded file content encoded as a Base64 string
fileName.name=File Name
fileName.description=The name of the downloaded file
mimeType.name=MIME Type
mimeType.description=The MIME type of the downloaded file content
fileSizeBytes.name=File Size (bytes)
fileSizeBytes.description=The size of the downloaded file in bytes
success.name=Success
success.description=Whether the operation completed successfully
errorMessage.name=Error Message
errorMessage.description=Error details if the operation failed
