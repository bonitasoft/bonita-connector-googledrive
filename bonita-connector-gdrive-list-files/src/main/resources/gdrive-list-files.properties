# GDrive - List Files connector i18n properties

# Connector label
connectorDefinitionLabel=Google Drive - List Files
connectorDefinitionDescription=Lists files and folders from Google Drive with filtering and sorting options.

# Page labels
connectionPage.pageTitle=Connection
connectionPage.pageDescription=Configure the Google Drive service account connection.
searchPage.pageTitle=Search
searchPage.pageDescription=Define the search scope and filters.
configurationPage.pageTitle=Configuration
configurationPage.pageDescription=Configure pagination, ordering, and type filtering.

# Input widget labels — Connection
serviceAccountKeyJson.label=Service Account Key (JSON)
serviceAccountKeyJson.description=The JSON content of the Google service account key file.
impersonatedUserEmail.label=Impersonated User Email
impersonatedUserEmail.description=Email of the user to impersonate via domain-wide delegation (optional).
applicationName.label=Application Name
applicationName.description=Application name sent to Google APIs.
connectTimeout.label=Connection Timeout (ms)
connectTimeout.description=HTTP connection timeout in milliseconds.
readTimeout.label=Read Timeout (ms)
readTimeout.description=HTTP read timeout in milliseconds.

# Input widget labels — Search
parentFolderId.label=Parent Folder ID
parentFolderId.description=Google Drive folder ID to list files from. Leave empty to search across all accessible files.
searchQuery.label=Search Query
searchQuery.description=Custom Drive query expression (e.g. "name contains 'report'"). Uses Google Drive query syntax.
mimeTypeFilter.label=MIME Type Filter
mimeTypeFilter.description=Filter results to a specific MIME type (e.g. "application/pdf").

# Input widget labels — Configuration
maxResults.label=Max Results
maxResults.description=Maximum number of files to return (1-1000).
orderBy.label=Order By
orderBy.description=Sort order for results.
includeFiles.label=Include Files
includeFiles.description=Include regular files in the results.
includeFolders.label=Include Folders
includeFolders.description=Include folders in the results.
