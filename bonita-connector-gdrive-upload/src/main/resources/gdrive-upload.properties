connectorDefinitionLabel=Google Drive - Upload
connectorDefinitionDescription=Upload files to Google Drive with support for folders, metadata, and Google format conversion.
google-drive.category=Google Drive
serviceAccountPage.pageTitle=Service Account Authentication
oauthPage.pageTitle=OAuth 2.0 Authentication
uploadPage.pageTitle=File Upload Details
destinationPage.pageTitle=Destination & Options
advancedPage.pageTitle=Connection Settings
serviceAccountJsonWidget.label=Service Account JSON
serviceAccountJsonWidget.description=Paste the full JSON key content from Google Cloud Console (not a file path). Required unless OAuth credentials are provided.
impersonateUserWidget.label=Impersonate User (Optional)
impersonateUserWidget.description=Email address of user to impersonate. Requires domain-wide delegation configured in Google Workspace.
applicationNameWidget.label=Application Name (Optional)
applicationNameWidget.description=Identifies your application in Google API logs. Default: Bonita-GDrive-Connector
clientIdWidget.label=OAuth Client ID
clientIdWidget.description=OAuth 2.0 Client ID from Google Cloud Console. Use this OR Service Account, not both.
clientSecretWidget.label=OAuth Client Secret
clientSecretWidget.description=OAuth 2.0 Client Secret. Keep this confidential.
refreshTokenWidget.label=Refresh Token
refreshTokenWidget.description=Pre-obtained refresh token from OAuth consent flow. Required with Client ID/Secret.
fileNameWidget.label=File Name *
fileNameWidget.description=Name for the uploaded file (e.g., "Report_2024.pdf"). Supports Bonita expressions.
fileContentWidget.label=File Content (Base64) *
fileContentWidget.description=File content encoded in Base64. Use a Groovy script to convert documents.
mimeTypeWidget.label=MIME Type (Optional)
mimeTypeWidget.description=Content type (e.g., "application/pdf", "image/png"). Auto-detected if omitted.
descriptionWidget.label=Description (Optional)
descriptionWidget.description=File description visible in Google Drive.
convertToGoogleFormatWidget.label=Convert to Google Format
convertToGoogleFormatWidget.description=Convert Office files to Google Docs/Sheets/Slides format.
parentFolderIdWidget.label=Parent Folder ID (Optional)
parentFolderIdWidget.description=Google Drive folder ID where the file will be uploaded. Leave empty for root folder.
customPropertiesWidget.label=Custom Properties (Optional)
customPropertiesWidget.description=Key-value metadata for file indexing.
connectTimeoutWidget.label=Connect Timeout (ms)
connectTimeoutWidget.description=Connection timeout in milliseconds. Default: 30000 (30 seconds).
readTimeoutWidget.label=Read Timeout (ms)
readTimeoutWidget.description=Read/response timeout in milliseconds. Default: 60000 (60 seconds).
