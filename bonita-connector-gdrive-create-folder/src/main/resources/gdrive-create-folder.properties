# i18n properties for GDrive - CreateFolder

# Connector label
connectorDefinitionLabel=GDrive - Create Folder
connectorDefinitionDescription=Creates a new folder in Google Drive

# Page labels
connectionPage.name=Connection
connectionPage.description=Configure authentication and connection settings
operationPage.name=Folder
operationPage.description=Configure the folder creation parameters

# Input parameter labels — Connection
serviceAccountKeyJson.name=Service Account Key (JSON)
serviceAccountKeyJson.description=The JSON key file content for the Google Cloud service account
impersonatedUserEmail.name=Impersonated User Email
impersonatedUserEmail.description=Email of the user to impersonate via domain-wide delegation (optional)
applicationName.name=Application Name
applicationName.description=Application name sent to Google APIs (default: Bonita-GoogleDrive-Connector)
connectTimeout.name=Connection Timeout (ms)
connectTimeout.description=HTTP connection timeout in milliseconds (default: 30000)
readTimeout.name=Read Timeout (ms)
readTimeout.description=HTTP read timeout in milliseconds (default: 60000)

# Input parameter labels — Folder
folderName.name=Folder Name
folderName.description=Name of the folder to create
parentFolderId.name=Parent Folder ID
parentFolderId.description=ID of the parent folder (optional, defaults to root)
description.name=Description
description.description=Description for the new folder (optional)

# Output parameter labels
folderId.name=Folder ID
folderId.description=The ID of the created folder
folderWebViewLink.name=Folder Web View Link
folderWebViewLink.description=URL to view the created folder in Google Drive
success.name=Success
success.description=Whether the operation completed successfully
errorMessage.name=Error Message
errorMessage.description=Error details if the operation failed
